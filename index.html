<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Destiny | Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #fff; color: #000; font-family: 'Noto Serif SC', serif; overflow-x: hidden; scroll-behavior: smooth; }
    .star-outline { position: absolute; top: 10%; left: 20%; width: 65vw; opacity: 0.08; z-index: -1; pointer-events: none; transition: transform 0.1s ease-out; }
    .album-vertical-list { height: 650px; overflow-y: auto; scrollbar-width: none; perspective: 1000px; padding: 40px 0; }
    .album-item { cursor: pointer; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); filter: grayscale(100%); opacity: 0.2; margin-bottom: 40px; }
    .album-item.active { filter: grayscale(0%); opacity: 1; transform: translateX(20px) scale(1.05) !important; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
    /* 核心修改：为可编辑封面增加光标样式 */
    .album-item img { cursor: edit; }
    .album-detail-wrap::before { content: attr(data-index); position: absolute; top: -80px; right: -40px; font-size: 20rem; font-weight: 900; color: rgba(0,0,0,0.03); z-index: -1; pointer-events: none; }
    .scrapbook-section { position: relative; min-height: 160vh; width: 100%; border-top: 1px solid #eee; background: #fafafa; overflow: hidden; }
    .scrap-item { position: absolute; transition: transform 0.3s, z-index 0.1s; z-index: 10; cursor: grab; }
    .scrap-item.active-grab { z-index: 100 !important; }
    .delete-mark { position: absolute; bottom: -10px; right: -10px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; z-index: 100; border: 2px solid #fff; }
    .scrap-item:hover .delete-mark { display: flex; }
    [contenteditable="true"] { border-bottom: 1px dashed rgba(0,0,0,0.2); outline: none; padding-bottom: 2px; transition: background 0.2s; }
    [contenteditable="true"]:hover { background: rgba(0,0,0,0.03); }
    [contenteditable="true"]:focus { border-bottom: 1px solid #000; background: rgba(0,0,0,0.05); }

    .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="syncStatus" style="position:fixed; top:10px; right:10px; font-size:10px; color:#ccc;">Cloud: Connecting...</div>
  <svg class="star-outline" id="bgStar" viewBox="0 0 512 512" fill="none" stroke="black" stroke-width="1.5"><path d="M256 40l61 168h175L350 312l54 160-148-98-148 98 54-160L20 208h175z"/></svg>

  <header class="min-h-screen flex flex-col md:flex-row items-center justify-center px-10 md:px-24">
    <div class="flex-1 z-10">
      <h1 class="text-[clamp(3rem,12vw,9rem)] font-light leading-[0.9]">ALL ABOUT<br>DESTINY.</h1>
      <p class="mt-14 text-2xl md:text-4xl italic opacity-60">"one thing i can tell you is you got to be free"</p>
    </div>
    <div class="flex-1 flex justify-center md:justify-end md:-ml-32 mt-12 md:mt-0">
      <img src="https://i.ibb.co/m58hqtc6/IMG-6823.jpg" class="w-64 md:w-96 shadow-2xl rotate-2">
    </div>
  </header>

  <section class="py-40 px-10 md:px-24 flex flex-col md:flex-row gap-20 items-center">
    <div class="w-full md:w-[40%] album-vertical-list" id="albumList"></div>
    <div class="flex-1 relative">
      <div id="albumDetail" class="album-detail-wrap opacity-0 transition-opacity duration-500 flex flex-col items-start gap-8">
        <img id="detailCover" src="" class="w-40 shadow-2xl self-center md:self-start opacity-80 mb-6">
        <div class="w-full">
            <h3 id="detailTitle" class="text-5xl font-black mb-2 tracking-tighter" ondblclick="makeEditable(this, 'albumName')"></h3>
            <p id="detailSongs" class="text-xs opacity-30 mb-10 tracking-widest uppercase" ondblclick="makeEditable(this, 'albumSongs')"></p>
            <div class="flex justify-between items-center border-b border-black mb-6 pb-2">
              <span class="text-[10px] uppercase tracking-widest">Archive Lyrics</span>
              <button onclick="openModal('albumLyric')" class="text-[10px] underline hover:font-bold">+ Add New</button>
            </div>
            <div id="albumLyricContainer" class="space-y-6"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="scrapbook-section" id="scrapbook">
    <div class="absolute top-10 left-10 z-[100] flex gap-4">
      <button onclick="openModal('scrapText')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Text</button>
      <button onclick="openModal('scrapImage')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Image URL</button>
    </div>
  </section>

  <footer class="py-48 px-10 text-center flex flex-col items-center">
    <div class="max-w-5xl text-3xl md:text-6xl italic font-light mb-72">Time doesn't always heal, it just breathes and swallows memories...</div>
    <div class="max-w-xl mx-auto text-left w-full">
      <div class="flex justify-between items-end mb-12 border-b border-black pb-2">
        <h2 class="text-4xl font-black">I WISH</h2>
        <button onclick="openModal('wish')" class="text-xs underline uppercase">Leave a message</button>
      </div>
      <div id="wishContainer" class="space-y-10"></div>
    </div>
  </footer>

  <div id="globalModal" class="modal">
    <div class="modal-content text-center w-full max-w-md p-6">
      <textarea id="modalInput" class="w-full h-40 border-b border-black outline-none p-4 text-xl bg-transparent" placeholder="Write here..."></textarea>
      <div class="mt-8 flex justify-center gap-10">
        <button onclick="closeModal()" class="uppercase text-xs tracking-widest">Cancel</button>
        <button onclick="saveContent()" class="uppercase text-xs font-bold underline tracking-widest">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient("https://ykymzuaobitdhoyyqmxp.supabase.co", "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS");
    const MASTER_CODE = "2026";
    // editableAlbums 用于存储对专辑信息的自定义修改（名字、歌曲、封面链接）
    let db = { albumLyrics: {}, customScraps: [], deletedInitials: [], wishes: [], editableAlbums: {} };

    const initialScraps = [
      { id:'s1', type:'text', content:'每次出门都幻想自己会阅读。每次都带着书出门带着没电的手机和没翻开的书。好吧', x:80, y:200 },
      { id:'s2', type:'text', content:'I\'m trying to go on this path But you say I haven\' t get the jests', x:550, y:120 },
      { id:'s3', type:'text', content:'这个世界大概在我十七岁的时候就毁灭了，现在的每一天都只是我的幻觉。', x:120, y:500 },
      { id:'s4', type:'text', content:'手裡有打開門的鑰匙但我得承认我只喜欢在生命的房间开一扇窗', x:400, y:750 },
      { id:'s5', type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg', x:650, y:350 },
      { id:'s6', type:'img', content:'https://i.ibb.co/mFGz0qmf/IMG-7532.jpg', x:180, y:900 },
      { id:'s7', type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg', x:750, y:850 },
      { id:'s8', type:'img', content:'https://i.ibb.co/BVZJFbZB/IMG-1072.jpg', x:80, y:1200 }
    ];

    // 核心修改：initialAlbums 仅作为备用，所有数据优先使用云端数据库
    const initialAlbums = [
      { id:1, name: 'EndSerenading (Mineral)', img: 'https://i.ibb.co/7dM4QCx4/IMG-6823.jpg', songs: 'Love Letter / Palisade / Gjs' },
      { id:2, name: '我们的灵魂乐 (透明杂志)', img: 'https://i.ibb.co/pB7Wvb7D/IMG-6824.jpg', songs: '永远的等待 / 少女 / 我们的灵魂乐' },
      { id:3, name: '亲爱的…我还不知道 (张悬)', img: 'https://i.ibb.co/pBHns4Yd/IMG-6821.jpg', songs: '关于我爱你 / 信任的样子 / 并不' },
      { id:4, name: '时间的歌 (陈绮贞)', img: 'https://i.ibb.co/whDZddfZ/IMG-6822.jpg', songs: '序曲 / 涟漪 / 柏拉图式的爱情' },
      { id:5, name: '的士房间 (薄荷叶)', img: 'https://i.ibb.co/4nC6wM7G/IMG-6828.jpg', songs: '的士房间 / 破坏 / 19岁' }
    ];

    async function load() {
      const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
      if (data) { db = data.content; if(!db.editableAlbums) db.editableAlbums = {}; }
      renderAll();
      document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    function renderAll() {
      const listEl = document.getElementById('albumList');
      listEl.innerHTML = '';
      initialAlbums.forEach((alb, idx) => {
        // 核心修改：检查云端是否有对该专辑封面链接的自定义修改
        const customData = db.editableAlbums[alb.id] || {};
        const currentCover = customData.img || alb.img; // 优先使用云端封面

        const div = document.createElement('div');
        div.className = `album-item group relative ${alb.id===window.currentId?'active':''}`;
        // 核心修改：左侧封面增加双击编辑封面链接的事件
        div.innerHTML = `
            <img src="${currentCover}" class="w-full shadow-lg" ondblclick="editAlbumCover(${alb.id})">
            <div class="absolute inset-0 bg-black/50 text-white text-[8px] opacity-0 group-hover:opacity-100 flex items-center justify-center uppercase tracking-widest transition-opacity">Edit Cover (dblclick)</div>
        `;
        div.onclick = (e) => { 
            // 只有点击图片本身（且不是双击时）才切换专辑
            if(e.target.tagName === 'IMG' && e.detail === 1) switchAlbum(alb, div); 
        };
        listEl.appendChild(div);
        if(idx===0 && !window.currentId) switchAlbum(alb, div);
      });
      renderScraps(); renderWishes(); renderLyrics();
    }

    // 核心修改：编辑专辑封面的函数
    window.editAlbumCover = async (albumId) => {
        if(!checkAuth()) return; // 检查权限（输入 2026）

        // 获取当前封面链接作为默认值
        const currentData = db.editableAlbums[albumId] || {};
        const initialAlb = initialAlbums.find(a => a.id === albumId);
        const currentImg = currentData.img || initialAlb.img;

        const newImgUrl = prompt("Paste new Image URL (e.g., https://i.ibb.co/...):", currentImg);
        
        if (newImgUrl && newImgUrl !== currentImg) {
            if(!db.editableAlbums[albumId]) db.editableAlbums[albumId] = {};
            db.editableAlbums[albumId].img = newImgUrl; // 保存新的封面链接
            
            await sync(); // 同步到云端
        }
    };

    function switchAlbum(alb, el) {
      document.querySelectorAll('.album-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active'); window.currentId = alb.id;
      const detail = document.getElementById('albumDetail');
      detail.style.opacity = 0; detail.setAttribute('data-index', '0' + alb.id);
      
      // 检查云端是否有对该专辑信息的自定义修改
      const customData = db.editableAlbums[alb.id] || {};
      
      setTimeout(() => {
        // 核心修改：优先使用云端封面大图链接
        document.getElementById('detailCover').src = customData.img || alb.img;
        document.getElementById('detailCover').style.display = document.getElementById('detailCover').src ? 'block' : 'none'; // 如果没有图片则隐藏
        
        // 优先使用云端自定义内容（专辑名和歌曲列表）
        document.getElementById('detailTitle').innerText = customData.name || alb.name;
        document.getElementById('detailSongs').innerText = customData.songs || alb.songs;
        renderLyrics(); detail.style.opacity = 1;
      }, 300);
    }

    function renderScraps() {
      const box = document.getElementById('scrapbook');
      box.querySelectorAll('.scrap-item').forEach(el => el.remove());
      initialScraps.forEach(s => { if(!db.deletedInitials.includes(s.id)) renderOne(s, true); });
      db.customScraps.forEach((s, i) => renderOne(s, false, i));
    }

    // 实现碎片点击浮起逻辑
    let maxZIndex = 10;
    function renderOne(s, isInit, idx) {
      const div = document.createElement('div');
      div.className = 'scrap-item group';
      div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
      div.style.transform = `rotate(${Math.random()*10-5}deg)`;
      div.style.zIndex = Math.floor(Math.random()*5)+1; 
      
      // 点击浮起
      div.onmousedown = () => {
          document.querySelectorAll('.scrap-item').forEach(i => i.classList.remove('active-grab'));
          div.classList.add('active-grab');
          maxZIndex++;
          div.style.zIndex = maxZIndex;
      };

      div.innerHTML = (s.type==='text'? `<div class="bg-white p-4 shadow-xl border max-w-xs text-xl font-light">${s.content}</div>` : `<img src="${s.content}" class="w-64 shadow-2xl">`) + 
                      `<div class="delete-mark" onclick="del(${isInit}, '${isInit?s.id:idx}')">×</div>`;
      document.getElementById('scrapbook').appendChild(div);
    }

    function renderLyrics() {
      const cont = document.getElementById('albumLyricContainer'); cont.innerHTML = '';
      (db.albumLyrics[window.currentId] || []).forEach((l, i) => {
        const d = document.createElement('div'); d.className = 'group border-l pl-4 hover:border-black transition-all relative';
        // 歌词双击可直接编辑
        d.innerHTML = `
            <p class="italic text-xl" ondblclick="makeEditable(this, 'lyric', ${i})">"${l}"</p>
            <button onclick="delLyric(${i})" class="hidden group-hover:block text-[8px] opacity-30 mt-1 uppercase tracking-widest absolute right-0 top-0">[Delete]</button>
        `;
        cont.appendChild(d);
      });
    }

    // 实时双击编辑文字逻辑
    window.makeEditable = (el, type, index) => {
        if(!checkAuth(true)) return; 

        el.contentEditable = true;
        el.focus();

        el.onblur = async () => {
            el.contentEditable = false;
            let newVal = el.innerText.trim();
            if (type === 'lyric') newVal = newVal.replace(/^"|"$/g, ''); 

            if(!db.editableAlbums[window.currentId]) db.editableAlbums[window.currentId] = {};

            if(type === 'albumName') db.editableAlbums[window.currentId].name = newVal;
            else if(type === 'albumSongs') db.editableAlbums[window.currentId].songs = newVal;
            else if(type === 'lyric') db.albumLyrics[window.currentId][index] = newVal;

            await sync();
        };

        el.onkeydown = (e) => {
            if(e.key === 'Enter') { e.preventDefault(); el.blur(); }
        };
    };

    // --- 核心：管理员逻辑 ---
    const checkAuth = (silent = false) => {
        const saved = localStorage.getItem('is_admin');
        if (saved === MASTER_CODE) return true;
        if(silent) return false; 

        const pw = prompt("Identity Verification Required:");
        if (pw === MASTER_CODE) {
            localStorage.setItem('is_admin', MASTER_CODE);
            return true;
        }
        return false;
    };

    function renderWishes() {
      const cont = document.getElementById('wishContainer'); cont.innerHTML = '';
      db.wishes.slice().reverse().forEach((w, i) => {
        const actualIndex = db.wishes.length - 1 - i;
        const d = document.createElement('div'); 
        d.className = 'group border-l pl-6 py-2 border-black/10 relative';
        d.innerHTML = `
            <p class="text-xl italic">"${w.content}"</p>
            <span class="text-[9px] opacity-20 block mt-2 uppercase">@${w.name} — ${w.time}</span>
            <button onclick="delWish(${actualIndex})" class="hidden group-hover:block absolute right-0 top-2 text-[8px] opacity-30 hover:opacity-100 uppercase">[Delete]</button>
        `;
        cont.appendChild(d);
      });
    }

    async function saveContent() {
      const val = document.getElementById('modalInput').value; if(!val) return;
      if(activeMode !== 'wish') {
        if(!checkAuth()) return alert("暗号不对哦");
      }
      if(activeMode === 'wish') {
          db.wishes.push({ content: val, name: 'Soul Ghost', time: new Date().toLocaleString() });
      } else if(activeMode === 'albumLyric') {
          if(!db.albumLyrics[window.currentId]) db.albumLyrics[window.currentId]=[];
          db.albumLyrics[window.currentId].push(val);
      } else {
          db.customScraps.push({ type: activeMode==='scrapText'?'text':'img', content: val, x: Math.random()*600, y: Math.random()*800+100 });
      }
      await sync(); closeModal();
    }

    window.del = async (isInit, key) => {
      if(!checkAuth()) return;
      if(isInit) db.deletedInitials.push(key); else db.customScraps.splice(key, 1);
      await sync();
    };

    window.delLyric = async (i) => {
      if(!checkAuth()) return;
      db.albumLyrics[window.currentId].splice(i, 1); await sync();
    };

    window.delWish = async (index) => {
      if(!checkAuth()) return;
      db.wishes.splice(index, 1); await sync();
    };

    async function sync() {
      document.getElementById('syncStatus').innerText = "Cloud: Syncing...";
      await _supabase.from('archive_data').upsert({ id: 1, content: db });
      renderAll(); // 重新渲染，使修改生效
      document.getElementById('syncStatus').innerText = "Cloud: Saved";
    }

    window.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX-window.innerWidth/2)*-0.01; const moveY = (e.clientY-window.innerHeight/2)*-0.01;
      document.getElementById('bgStar').style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    let activeMode = '';
    function openModal(m) { activeMode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; document.getElementById('modalInput').value = ''; }

    load();
  </script>
</body>
</html>
