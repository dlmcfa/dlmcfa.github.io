<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Archive | 云端档案馆</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'PingFang SC', "Microsoft YaHei", serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; border: 1px solid #eee; padding: 15px; border-radius: 12px; background: #fafafa; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 12px; text-align: center; color: #aaa; }
        .list-title { margin-top: 40px; font-weight: bold; border-top: 1px solid #eee; padding-top: 20px; }
        .item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 15px; line-height: 1.6; }
        .time { font-size: 10px; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DESTINY.</h1>
        <div class="subtitle">Livehouse 摄影与灵感记录仪</div>
        
        <textarea id="textInput" placeholder="输入演出现场感悟或图片 URL..."></textarea>
        <button onclick="saveToCloud()">存入云端档案馆</button>
        <div id="status">同步状态：就绪</div>

        <div class="list-title">最近的存证</div>
        <div id="archiveList"></div>
    </div>

    <script>
        // 配置你的 Supabase 密钥
        const SB_URL = "https://ykymzuaobitdhoyyqmxp.supabase.co"; 
        const SB_KEY = "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // 保存数据到云端
        async function saveToCloud() {
            const contentText = document.getElementById('textInput').value;
            if(!contentText) return alert("写点东西再存吧！");
            
            document.getElementById('status').innerText = "正在穿越大气层同步中...";
            
            const { error } = await _supabase
                .from('archive_data')
                .insert([{ content: { note: contentText } }]);

            if (error) {
                document.getElementById('status').innerText = "失败了：" + error.message;
            } else {
                document.getElementById('status').innerText = "✅ 已永久存入云端数据库";
                document.getElementById('textInput').value = "";
                fetchData(); // 刷新列表
            }
        }

        // 从云端读取数据
        async function fetchData() {
            const { data, error } = await _supabase
                .from('archive_data')
                .select('*')
                .order('created_at', { ascending: false });

            if (data) {
                const listDiv = document.getElementById('archiveList');
                listDiv.innerHTML = data.map(item => `
                    <div class="item">
                        ${item.content.note}
                        <div class="time">${new Date(item.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            }
        }

        // 页面打开时自动加载
        fetchData();
    </script>
</body>
</html>
