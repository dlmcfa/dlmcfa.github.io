<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Archive | All About Destiny</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #000; color: #fff; font-family: 'Noto Serif SC', serif; margin: 0; overflow: hidden; }
    #cosmos-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    
    /* 界面UI，层级高于 3D 场景 */
    .ui-overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
    .ui-overlay * { pointer-events: auto; }
    
    .status-bar { position: fixed; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); }
    .header-text { position: fixed; bottom: 40px; left: 40px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
    
    /* 留言板UI保持优雅扁平 */
    .wish-panel { position: fixed; top: 20px; left: 20px; width: 300px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; max-height: 80vh; overflow-y: auto; scrollbar-width: none; backdrop-filter: blur(10px); }
    .wish-item { border-left: 2px solid rgba(255,255,255,0.2); padding-left: 10px; margin-bottom: 15px; }
    
    /* 弹窗样式 */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
  </style>
</head>
<body>
  
  <div id="cosmos-canvas"></div>

  <div class="ui-overlay">
    <div id="syncStatus" class="status-bar">Cosmos: Connecting...</div>

    <header class="header-text">
      <h1 class="text-[clamp(1.5rem,4vw,3rem)] font-light leading-[0.9] opacity-80">COSMOS<br>ARCHIVE.</h1>
      <p class="mt-4 text-xs italic opacity-30">All About Destiny. Floating Memories.</p>
    </header>

    <div class="wish-panel">
      <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-4">
        <h2 class="text-lg font-black tracking-tight">I WISH / 留言板</h2>
        <button onclick="openModal('wish')" class="text-[10px] underline uppercase tracking-widest opacity-60 hover:opacity-100">+ Leave</button>
      </div>
      <div id="wishContainer" class="space-y-4 text-sm font-light"></div>
    </div>
  </div>

  <div id="globalModal" class="modal">
    <div class="modal-content text-center w-full max-w-md p-6">
      <textarea id="modalInput" class="w-full h-40 border-b border-white outline-none p-4 text-xl bg-transparent text-white" placeholder="Write into cosmos..."></textarea>
      <div class="mt-8 flex justify-center gap-10">
        <button onclick="closeModal()" class="uppercase text-xs tracking-widest opacity-60">Cancel</button>
        <button onclick="saveContent()" class="uppercase text-xs font-bold underline tracking-widest">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // --- 0.Supabase & Admin 逻辑保持不变 ---
    const _supabase = supabase.createClient("https://ykymzuaobitdhoyyqmxp.supabase.co", "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS");
    const MASTER_CODE = "2026";
    let db = { wishes: [] };
    const randomNames = ["Soul Ghost", "Blue Mood", "Archive Traveler", "Midnight Listener", "Echo Walker"];

    const checkAuth = () => {
      if(localStorage.getItem('is_admin') === MASTER_CODE) return true;
      const pw = prompt("Identity Verification / 身份驗證:");
      if(pw === MASTER_CODE) { localStorage.setItem('is_admin', MASTER_CODE); return true; }
      alert("權限不足！"); return false;
    };

    // --- 1. Three.js 宇宙 3D 场景设置 ---
    let scene, camera, renderer, controls;
    let particles; // 星群
    let memoryObjects = []; // 存储所有 3D 碎片物体
    let targetObject = null; // 当前聚焦的物体
    let originalCamPos; // 记录聚焦前的相机位置

    function initCosmos() {
      // 创建场景、相机、渲染器
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000000, 0.001); // 增加深邃的雾气
      
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 50, 200); // 初始视角
      originalCamPos = camera.position.clone();

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('cosmos-canvas').appendChild(renderer.domElement);

      // 核心：添加控制器，实现拖拽旋转视角
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; // 增加阻尼感，更丝滑
      controls.dampingFactor = 0.05;
      controls.minDistance = 20;
      controls.maxDistance = 1000;

      // 添加灯光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(1, 1, 1);
      scene.add(directionalLight);

      // 创建动态星空背景
      createStars();
      // 创建初始记忆碎片
      createInitialMemories();

      // 处理窗口大小变化
      window.addEventListener('resize', onWindowResize, false);
      // 处理点击聚焦
      window.addEventListener('click', onDocumentMouseClick, false);

      animate();
    }

    function createStars() {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const textureLoader = new THREE.TextureLoader();
      // 随机生成 5000 颗星星
      for (let i = 0; i < 5000; i++) {
        vertices.push(THREE.MathUtils.randFloatSpread(2000)); // X
        vertices.push(THREE.MathUtils.randFloatSpread(2000)); // Y
        vertices.push(THREE.MathUtils.randFloatSpread(2000)); // Z
      }
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      
      const material = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 1.5, transparent: true });
      particles = new THREE.Points(geometry, material);
      scene.add(particles);
    }

    // 核心修改：将初始的平面碎片变成 3D 空间中的物体
    function createInitialMemories() {
      const initialScraps = [
        { type:'text', content:'每次出門都幻想自己會閱讀。'},
        { type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg'},
        { type:'text', content:'現在的每一天都只是我的幻覺。'},
        { type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg'}
      ];
      initialScraps.forEach(s => renderOne3D(s));
    }

    // 真正的 3D 渲染函数
    function renderOne3D(s) {
      const textureLoader = new THREE.TextureLoader();
      let geometry, material;

      if(s.type === 'img') {
          geometry = new THREE.PlaneGeometry(30, 45); // 照片比例
          material = new THREE.MeshPhongMaterial({ 
              map: textureLoader.load(s.content), 
              transparent: true, 
              opacity: 0.8,
              side: THREE.DoubleSide
          });
      } else {
          // Three.js 渲染文字比较复杂，这里暂时用一张预生成的“文字卡片”代替，
          // 后续我们会完善真正的文本渲染或 HTML 混合渲染。
          geometry = new THREE.PlaneGeometry(40, 20); 
          material = new THREE.MeshPhongMaterial({ 
              color: 0xffffff, 
              transparent: true, 
              opacity: 0.7,
              side: THREE.DoubleSide
          });
          // 你可以把这里的 content 文字生成一张图片链接粘进去
      }

      const mesh = new THREE.Mesh(geometry, material);
      // 在多维空间中随机分布
      mesh.position.set(
          THREE.MathUtils.randFloatSpread(400),
          THREE.MathUtils.randFloatSpread(300) + 50,
          THREE.MathUtils.randFloatSpread(200) // 增加深度感
      );
      mesh.rotation.set(
          Math.random() * 0.2,
          Math.random() * 0.2,
          Math.random() * 0.1
      );
      
      mesh.userData = { id: s.id, content: s.content }; // 存储数据以便交互
      scene.add(mesh);
      memoryObjects.push(mesh);
    }

    // 处理点击聚焦逻辑
    function onDocumentMouseClick(event) {
        event.preventDefault();
        const mouse = new THREE.Vector2();
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);

        // 检查射线是否穿过记忆碎片
        const intersects = raycaster.intersectObjects(memoryObjects);

        if (intersects.length > 0) {
            // 点击了某个碎片
            targetObject = intersects[0].object;
            focusOnObject(targetObject);
        } else {
            // 点击了空白处，返回
            if(targetObject) {
                targetObject = null;
                resetView();
            }
        }
    }

    // 视角飞掠：聚焦放大选中的碎片
    function focusOnObject(obj) {
        // 碎片正对相机
        controls.enabled = false; // 暂时禁用手动控制

        // 复制碎片的位置，并在 Z轴方向偏移一段距离作为相机的新位置
        const newPos = obj.position.clone().add(new THREE.Vector3(0, 0, 50));
        
        // 简单平滑移动（更复杂的移动可以使用 TWEEN.js 库）
        moveCamera(newPos, obj.position);
    }

    function resetView() {
        controls.enabled = true; // 恢复手动控制
        moveCamera(originalCamPos, new THREE.Vector3(0, 0, 0));
    }

    // 简单的相机移动函数（缺乏缓动效果，仅作演示）
    function moveCamera(pos, targetPos) {
        camera.position.set(pos.x, pos.y, pos.z);
        controls.target.set(targetPos.x, targetPos.y, targetPos.z);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.0001; // 星空缓慢旋转
      
      // 让没被聚焦的碎片轻微漂浮
      memoryObjects.forEach(mesh => {
          if(mesh !== targetObject) {
            mesh.position.y += Math.sin(Date.now() * 0.001 + mesh.position.x) * 0.05;
          }
      });

      controls.update();
      renderer.render(scene, camera);
    }

    // --- 3. Supabase & Wishes 逻辑保持不变 ---
    async function loadDb() {
      const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
      if (data) { db = data.content; renderWishes(); }
      document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    function renderWishes() {
      const cont = document.getElementById('wishContainer'); cont.innerHTML = '';
      (db.wishes || []).slice().reverse().forEach((w, i) => {
        const d = document.createElement('div'); d.className = 'wish-item';
        d.innerHTML = `<p class="italic">"${w.content}"</p><span class="text-[9px] opacity-30 block mt-1 uppercase">@${w.name} — ${w.time}</span>`;
        cont.appendChild(d);
      });
    }

    async function saveContent() {
      const val = document.getElementById('modalInput').value; if(!val) return;
      if(activeMode === 'wish') {
        const randomName = randomNames[Math.floor(Math.random() * randomNames.length)];
        if(!db.wishes) db.wishes = [];
        db.wishes.push({ content: val, name: randomName, time: new Date().toLocaleString() });
        await sync();
      } else {
        // 如果是加碎片功能，需要在此完善 renderOne3D 并验证权限
        if(checkAuth()) alert("管理功能正在升级 3D 兼容，敬请期待！");
      }
      closeModal();
    }

    async function sync() {
      document.getElementById('syncStatus').innerText = "Cosmos: Syncing...";
      await _supabase.from('archive_data').upsert({ id: 1, content: db });
      renderWishes();
      document.getElementById('syncStatus').innerText = "Cosmos: Saved";
    }

    let activeMode = '';
    function openModal(m) { activeMode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; document.getElementById('modalInput').value = ''; }
    
    // 启动 3D 场景和数据加载
    initCosmos();
    loadDb();
  </script>
</body>
</html>
